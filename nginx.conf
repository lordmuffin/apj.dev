server {
  listen 80 default_server;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Astro outputs /blog/post-slug/index.html — try as-is, then append slash, then 404
  location / {
    try_files $uri $uri/ $uri.html =404;
  }

  # cache static assets aggressively
  location ~* \.(?:css|js|woff2?|ttf|eot|svg|jpg|jpeg|png|gif|webp|avif|ico)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  # never cache html
  location ~* \.html$ {
    add_header Cache-Control "no-cache, must-revalidate";
  }

  # security headers (TLS handled at the reverse proxy)
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  # gzip
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml application/rss+xml;

  error_page 404 /404.html;
}
